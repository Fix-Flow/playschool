version: "3.9"

services:
  # ─── PostgreSQL Database ───────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: playschl-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-playschl}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-playschl_secret}
      POSTGRES_DB: ${DB_NAME:-playschl_dev}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-playschl}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - playschl-network

  # ─── Redis Cache ───────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: playschl-cache
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-playschl_redis}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-playschl_redis}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - playschl-network

  # ─── API Server ────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: ./docker/api/Dockerfile
      target: development
    container_name: playschl-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-4000}:4000"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://${DB_USER:-playschl}:${DB_PASSWORD:-playschl_secret}@postgres:5432/${DB_NAME:-playschl_dev}
      REDIS_URL: redis://:${REDIS_PASSWORD:-playschl_redis}@redis:6379
    volumes:
      - ./apps/api:/app/apps/api
      - ./packages:/app/packages
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - playschl-network

  # ─── Web Frontend ──────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: ./docker/web/Dockerfile
      target: development
    container_name: playschl-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-3000}:3000"
    environment:
      VITE_API_URL: http://localhost:${API_PORT:-4000}/api/v1
    volumes:
      - ./apps/web:/app/apps/web
      - ./packages:/app/packages
      - /app/node_modules
    depends_on:
      - api
    networks:
      - playschl-network

  # ─── MinIO (S3-compatible storage for files) ──────────────────
  minio:
    image: minio/minio:latest
    container_name: playschl-storage
    restart: unless-stopped
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-playschl_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-playschl_minio_secret}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - playschl-network

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  playschl-network:
    driver: bridge
